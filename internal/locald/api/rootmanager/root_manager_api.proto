syntax = "proto3";

import "internal/locald/api/common.proto";

option go_package = "github.com/signadot/cli/internal/locald/api/rootmanager";

package rootmanager;


service RootManagerAPI {
  // This method returns the status of the root controller
  rpc Status(StatusRequest) returns (StatusResponse) {}

  // This method requests the root controller to shutdown
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse) {}

  // This method returns the resolvable cluster hosts and their assigned
  // addresses, regardless of whether name resolution is served via /etc/hosts
  // or the local DNS resolver.
  rpc GetHosts(GetHostsRequest) returns (GetHostsResponse) {}
}

// Status
// ----------------------------------------------------------------------------

message StatusRequest {
}

message StatusResponse {
  apicommon.LocalNetStatus localnet = 1;
  apicommon.HostsStatus hosts = 2;
  apicommon.LocalDNSStatus local_dns = 3;
}

// Shutdown
// ----------------------------------------------------------------------------

message ShutdownRequest {
}

message ShutdownResponse {
}

// Hosts
// ----------------------------------------------------------------------------

message GetHostsRequest {
}

message GetHostsResponse {
  repeated apicommon.HostEntry entries = 1;
}