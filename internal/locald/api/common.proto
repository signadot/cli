syntax = "proto3";

import "google/protobuf/timestamp.proto";

option go_package = "github.com/signadot/cli/internal/locald/api";

package apicommon;


// Service health
message ServiceHealth {
  bool healthy = 1;
  uint32 error_count = 2;
  string last_error_reason = 3;
  google.protobuf.Timestamp last_error_time = 4;
}

// LocalNet status (produced by root controller)
message LocalNetStatus {
  ServiceHealth health = 1;
  repeated string cidrs = 2;
  repeated string excluded_cidrs = 3;
}

// Hosts status (produced by root controller)
message HostsStatus {
  ServiceHealth health = 1;
  uint32 num_hosts = 2;
  uint32 num_updates = 3;
  google.protobuf.Timestamp last_update_time = 4;
}

// LocalDNS status (produced by root controller)
message LocalDNSStatus {
  ServiceHealth health = 1;
  string mode = 2;
  string bind_addr = 3;
  repeated string suffixes = 4;
  repeated string upstreams = 5;
  uint32 record_count = 6;
  google.protobuf.Timestamp last_refresh = 7;
  bool resolv_conf_managed = 8;
  string warning = 9;
}

// HostEntry is a single resolvable cluster name and the synthetic address(es)
// assigned to it. It is the unit returned by the GetHosts RPCs and is
// independent of the name-resolution mechanism (/etc/hosts or local DNS): both
// draw from the same address allocator in the root controller.
message HostEntry {
  string name = 1;
  // Single resolvable address for the host. A host is assigned one virtual
  // address (IPv4-preferred; IPv6 on an IPv6-only allocation), so there is no
  // plurality to carry here.
  string ip = 2;
}

// PortForward status (produced by local controller)
message PortForwardStatus {
  ServiceHealth health = 1;
  string local_address = 2;
}

// ControlPlaneProxy status (produced by local controller)
message ControlPlaneProxyStatus {
  ServiceHealth health = 1;
  string local_address = 2;
}

// Sandboxes watcher status (produced by local controller)
message WatcherStatus {
  ServiceHealth health = 1;
}

// Sandbox status (produced by local controller)
message SandboxStatus {
  message Baseline {
    string apiVersion = 1;
    string kind = 2;
    string namespace = 3;
    string name = 4;
  }

  message BaselineToLocal {
    int32  baseline_port = 1;
    string local_address = 2;
  }

  message LocalWorkload {
    // The workload name
    string name = 1;
    // "fork target"
    Baseline baseline = 2;
    // associative map from baseline ports to local address 
    // destinations in the tunnel
    repeated BaselineToLocal workloadPortMapping = 3;
    // tunnel health
    ServiceHealth tunnel_health = 4;
  }

  string name = 1;
  string routing_key = 2;
  repeated LocalWorkload local_workloads = 3;
}

message OperatorInfo {
  string version = 1;
  string git_commit = 2;
  string build_date = 3;
}

// Devbox session status (produced by local controller)
message DevboxSessionStatus {
  // Whether the devbox session is active and healthy
  bool healthy = 1;
  // Devbox ID
  string devbox_id = 2;
  // Session ID
  string session_id = 3;
  // Last error reason if unhealthy
  string last_error_reason = 4;
  // Last error time if unhealthy
  google.protobuf.Timestamp last_error_time = 5;
}