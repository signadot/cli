version: 2
project_name: signadot-cli
builds:
- main: ./cmd/signadot
  id: signadot
  binary: signadot
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  env:
  - CGO_ENABLED=0
  ldflags:
  - -X github.com/signadot/cli/internal/buildinfo.Version=v{{ .Version }}
  - -X github.com/signadot/cli/internal/buildinfo.GitCommit={{ .ShortCommit }}
  - -X github.com/signadot/cli/internal/buildinfo.BuildDate={{ .Date }}
archives:
- id: signadot
  ids:
  - signadot
  name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  files:
  # We don't want any extra files besides the actual binary.
  # Set a pattern that matches nothing to override the default file globs.
  - none*
checksum:
  name_template: checksums.txt
snapshot:
  version_template: "{{ .Version }}-{{ .ShortCommit }}"
homebrew_casks:
- name: signadot-cli
  description: Command-line interface for Signadot
  homepage: https://signadot.com
  directory: Casks
  commit_author:
    name: foxish
    email: info@signadot.com
  repository:
    owner: signadot
    name: homebrew-tap
  ids:
  - signadot
  binaries:
  - signadot
dockers_v2:
  - ids: ['signadot']
    dockerfile: Dockerfile
    images:
      - "signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}"
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "v{{ .Version }}"
      - "latest"
    labels:
      "com.signadot.image.created": "{{.Date}}"
      "com.signadot.image.title": "{{.ProjectName}}"
      "com.signadot.image.revision": "{{.ShortCommit}}"
      "com.signadot.image.version": "{{.Version}}"
mcp:
  name: io.github.signadot/cli
  title: Signadot MCP Server
  description: Connect to Signadot to manage ephemeral environments and route traffic to local services.
  homepage: https://signadot.com
  repository:
    url: https://github.com/signadot/cli
    source: github
  packages:
  - registry_type: mcpb
    identifier: "https://github.com/signadot/cli/releases/download/v{{ .Version }}/signadot-cli_{{ .Os }}_{{ .Arch }}.tar.gz"
    transport:
      type: stdio
