version: 2
project_name: signadot-cli
builds:
- main: ./cmd/signadot
  id: signadot
  binary: signadot
  goos:
  - linux
  - darwin
  goarch:
  - amd64
  - arm64
  env:
  - CGO_ENABLED=0
  ldflags:
  - -X github.com/signadot/cli/internal/buildinfo.Version=v{{ .Version }}
  - -X github.com/signadot/cli/internal/buildinfo.GitCommit={{ .ShortCommit }}
  - -X github.com/signadot/cli/internal/buildinfo.BuildDate={{ .Date }}
env:
  - 'SIGNADOT_IMAGE_SUFFIX={{ index .Env "SIGNADOT_IMAGE_SUFFIX" }}'
archives:
- id: signadot
  ids:
  - signadot
  name_template: "{{ .ProjectName }}_mcp_{{ .Os }}_{{ .Arch }}"
  files:
  # We don't want any extra files besides the actual binary.
  # Set a pattern that matches nothing to override the default file globs.
  - none*
checksum:
  name_template: checksums.txt
snapshot:
  version_template: "{{ .Version }}-{{ .ShortCommit }}"
homebrew_casks:
- name: signadot-cli
  description: Command-line interface for Signadot
  homepage: https://signadot.com
  directory: Casks
  commit_author:
    name: foxish
    email: info@signadot.com
  repository:
    owner: signadot
    name: homebrew-tap
  ids:
  - signadot
  binaries:
  - signadot
dockers:
  -
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    ids: ['signadot']
    image_templates:
      - "signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:v{{ .Version }}-amd64"
      - "signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:latest-amd64"
    build_flag_templates:
      - "--label=com.signadot.image.created={{.Date}}"
      - "--label=com.signadot.image.title={{.ProjectName}}"
      - "--label=com.signadot.image.revision={{.ShortCommit}}"
      - "--label=com.signadot.image.version={{.Version}}"
      - "--platform=linux/amd64"
  -
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    ids: ['signadot']
    image_templates:
      - "signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:v{{ .Version }}-arm64v8"
      - "signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:latest-arm64v8"
    build_flag_templates:
      - "--label=com.signadot.image.created={{.Date}}"
      - "--label=com.signadot.image.title={{.ProjectName}}"
      - "--label=com.signadot.image.revision={{.ShortCommit}}"
      - "--label=com.signadot.image.version={{.Version}}"
      - "--platform=linux/arm64/v8"
docker_manifests:
  - name_template: signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:v{{ .Version }}
    image_templates:
      - signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:v{{ .Version }}-amd64
      - signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:v{{ .Version }}-arm64v8
    create_flags:
      - "--amend"
  - name_template: signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:latest
    image_templates:
      - signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:latest-amd64
      - signadot/signadot-cli{{ .Env.SIGNADOT_IMAGE_SUFFIX }}:latest-arm64v8
    create_flags:
      - "--amend"
mcp:
  name: io.github.signadot/cli
  title: Signadot MCP Server
  description: Connect to Signadot to manage ephemeral environments and route traffic to local services.
  homepage: https://signadot.com
  repository:
    url: https://github.com/signadot/cli
    source: github
  packages:
  - registry_type: mcpb
    identifier: "https://github.com/signadot/cli/releases/download/v{{ .Version }}/signadot-cli_mcp_{{ .Os }}_{{ .Arch }}.tar.gz"
    transport:
      type: stdio
